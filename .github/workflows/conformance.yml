name: QSO-GENOMES conformance

on:
  pull_request:
  push:
    branches:
      - main
      - "builder/**"

permissions:
  contents: read

concurrency:
  group: qso-genomes-conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "0"
  TZ: UTC

jobs:
  conformance:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out reviewed commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pinned validator dependency
        run: python -m pip install --disable-pip-version-check --no-cache-dir -r requirements.txt

      - name: Record environment and exact source state
        run: |
          mkdir -p reports/ci/${{ matrix.python-version }}
          printf '%s\n' "$(git rev-parse HEAD)" | tee reports/ci/${{ matrix.python-version }}/checked-out-sha.txt
          printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" > reports/ci/${{ matrix.python-version }}/event-head-sha.txt
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"
          python --version 2>&1 | tee reports/ci/${{ matrix.python-version }}/python-version.txt
          python -m pip --version | tee reports/ci/${{ matrix.python-version }}/pip-version.txt
          python -c "import jsonschema; print('jsonschema', jsonschema.__version__)" | tee reports/ci/${{ matrix.python-version }}/jsonschema-version.txt

      - name: Run all conformance gates and retain diagnostics
        shell: bash
        run: |
          set +e
          output="reports/ci/${{ matrix.python-version }}"

          python scripts/validate_schema_set.py 2>&1 | tee "$output/schema-validation.log"
          schema_status=${PIPESTATUS[0]}
          printf '%s\n' "$schema_status" > "$output/schema-validation.exit-code"

          python -m unittest discover -s tests -v 2>&1 | tee "$output/unittest.log"
          test_status=${PIPESTATUS[0]}
          printf '%s\n' "$test_status" > "$output/unittest.exit-code"

          python scripts/generate_contract_manifest.py --check 2>&1 | tee "$output/manifest-check.log"
          manifest_status=${PIPESTATUS[0]}
          printf '%s\n' "$manifest_status" > "$output/manifest-check.exit-code"

          cp manifests/qso-genomes-compatibility-v1.json "$output/committed-manifest.json"
          python scripts/generate_contract_manifest.py 2>&1 | tee "$output/manifest-generation.log"
          generation_status=${PIPESTATUS[0]}
          printf '%s\n' "$generation_status" > "$output/manifest-generation.exit-code"
          cp manifests/qso-genomes-compatibility-v1.json "$output/generated-manifest.json"

          sha256sum "$output"/* > "$output/SHA256SUMS"
          printf 'schema=%s tests=%s manifest=%s generation=%s\n' "$schema_status" "$test_status" "$manifest_status" "$generation_status" | tee "$output/gate-summary.txt"
          exit 0

      - name: Upload exact-head conformance evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qso-genomes-conformance-${{ github.event.pull_request.head.sha || github.sha }}-py${{ matrix.python-version }}
          path: reports/ci/${{ matrix.python-version }}
          if-no-files-found: error
          retention-days: 90

      - name: Enforce conformance gate results
        shell: bash
        run: |
          output="reports/ci/${{ matrix.python-version }}"
          test "$(cat "$output/schema-validation.exit-code")" -eq 0
          test "$(cat "$output/unittest.exit-code")" -eq 0
          test "$(cat "$output/manifest-check.exit-code")" -eq 0
          test "$(cat "$output/manifest-generation.exit-code")" -eq 0
