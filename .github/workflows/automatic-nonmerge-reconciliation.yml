name: Non-Merge Reconciliation Assessment

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Optional pull request number to assess
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: nonmerge-assessment-${{ github.event.pull_request.number || inputs.pull_request_number || github.run_id }}
  cancel-in-progress: true

jobs:
  assess:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      AGENT_ID: michael_aaron_redmond
      REVIEW_AUTHORITY_ID: jacob_thomas_redmond
    steps:
      - name: Resolve pull request set
        id: prs
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.pull_request_number || '' }}" ]; then
            printf '%s\n' "${{ inputs.pull_request_number }}" > /tmp/prs.txt
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            printf '%s\n' "${{ github.event.pull_request.number }}" > /tmp/prs.txt
          else
            : > /tmp/prs.txt
          fi
          echo "count=$(wc -l < /tmp/prs.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Assess mergeability without repository mutation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports
          while IFS= read -r PR_NUMBER; do
            [ -n "$PR_NUMBER" ] || continue
            STATE="UNKNOWN"
            for attempt in 1 2 3 4 5; do
              STATE="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json mergeStateStatus --jq '.mergeStateStatus')"
              [ "$STATE" != "UNKNOWN" ] && break
              sleep 6
            done
            BASE_REF="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName --jq '.baseRefName')"
            HEAD_REF="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefName --jq '.headRefName')"
            HEAD_REPO="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRepository --jq '.headRepository.nameWithOwner')"
            HEAD_SHA="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')"
            BASE_SHA="$(gh api "repos/$GITHUB_REPOSITORY/commits/$BASE_REF" --jq '.sha')"
            ACTION="none"
            REASON="mergeable_or_pending"
            if [ "$STATE" = "DIRTY" ]; then
              ACTION="human_reconciliation_required"
              REASON="merge_conflicts"
            fi
            if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
              ACTION="human_reconciliation_required"
              REASON="external_fork_head"
            fi
            python - <<PY
          import json
          from pathlib import Path
          report = {
              "report_version": 1,
              "agent_id": "${AGENT_ID}",
              "review_authority_id": "${REVIEW_AUTHORITY_ID}",
              "pull_request_number": int("$PR_NUMBER"),
              "merge_state": "$STATE",
              "base_ref": "$BASE_REF",
              "base_sha": "$BASE_SHA",
              "head_ref": "$HEAD_REF",
              "head_repo": "$HEAD_REPO",
              "head_sha": "$HEAD_SHA",
              "action": "$ACTION",
              "reason": "$REASON",
              "repository_write_authorized": False,
              "automatic_merge_authorized": False,
              "human_review_required": "$ACTION" != "none",
          }
          Path("reports/pr-$PR_NUMBER.json").write_text(
              json.dumps(report, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
          done < /tmp/prs.txt

      - name: Upload reconciliation assessment
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nonmerge-assessment-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: reports/
