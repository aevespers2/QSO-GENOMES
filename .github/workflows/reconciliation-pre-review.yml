name: Reconciliation Pre-Review Gate

on:
  pull_request:
    paths:
      - '.github/workflows/automatic-nonmerge-reconciliation.yml'
      - '.github/workflows/reconciliation-pre-review.yml'
      - 'tests/test_reconciliation_workflow.py'
      - 'punchlist.md'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out exact submitted head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Assert exact head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install pinned test runner
        run: python -m pip install --disable-pip-version-check 'pytest==8.4.2'

      - name: Run focused reconciliation tests
        run: pytest -q tests/test_reconciliation_workflow.py
