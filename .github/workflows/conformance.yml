name: QSO-GENOMES conformance

on:
  pull_request:
  push:
    branches:
      - main
      - "builder/**"

permissions:
  contents: read

concurrency:
  group: qso-genomes-conformance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "0"
  TZ: UTC

jobs:
  conformance:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out reviewed commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pinned validator dependency
        run: python -m pip install --disable-pip-version-check --no-cache-dir jsonschema==4.26.0

      - name: Record environment
        run: |
          git rev-parse HEAD
          python --version
          python -m pip --version
          python -c "import jsonschema; print('jsonschema', jsonschema.__version__)"

      - name: Validate genomes and Sprite against Draft 2020-12 schemas
        run: python scripts/validate_schema_set.py

      - name: Run deterministic contract suite
        run: python -m unittest discover -s tests -v

      - name: Replay compatibility manifest
        run: python scripts/generate_contract_manifest.py --check
