name: Automatic Non-Merge Reconciliation

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Optional pull request number to reconcile
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: nonmerge-reconciliation-${{ github.event.pull_request.number || inputs.pull_request_number || github.run_id }}
  cancel-in-progress: false

jobs:
  detect-and-reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      AGENT_ID: michael_aaron_redmond
      REVIEW_AUTHORITY_ID: jacob_thomas_redmond
    steps:
      - name: Resolve pull request set
        id: prs
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.pull_request_number || '' }}" ]; then
            printf '%s\n' "${{ inputs.pull_request_number }}" > /tmp/prs.txt
          elif [ "${{ github.event_name }}" = "pull_request_target" ]; then
            printf '%s\n' "${{ github.event.pull_request.number }}" > /tmp/prs.txt
          else
            gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 100 --json number --jq '.[].number' > /tmp/prs.txt
          fi
          sort -n -u /tmp/prs.txt -o /tmp/prs.txt
          echo "count=$(wc -l < /tmp/prs.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Inspect mergeability and prepare reconciliation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports

          comment_once() {
            local pr_number="$1"
            local marker="$2"
            local body="$3"
            if gh api --paginate "repos/$GITHUB_REPOSITORY/issues/$pr_number/comments?per_page=100" --jq '.[].body' | grep -Fq "$marker"; then
              return 0
            fi
            gh pr comment "$pr_number" --repo "$GITHUB_REPOSITORY" --body "$body

          $marker"
          }

          while IFS= read -r PR_NUMBER; do
            [ -n "$PR_NUMBER" ] || continue

            STATE="UNKNOWN"
            for attempt in 1 2 3 4 5; do
              STATE="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json mergeStateStatus --jq '.mergeStateStatus')"
              [ "$STATE" != "UNKNOWN" ] && break
              sleep 6
            done

            if [ "$STATE" != "DIRTY" ]; then
              printf '{"pr":%s,"merge_state":"%s","action":"none"}\n' "$PR_NUMBER" "$STATE" > "reports/pr-${PR_NUMBER}.json"
              continue
            fi

            BASE_REF="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName --jq '.baseRefName')"
            HEAD_REF="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefName --jq '.headRefName')"
            HEAD_REPO="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRepository --jq '.headRepository.nameWithOwner')"
            HEAD_SHA="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')"
            BASE_SHA="$(gh api "repos/$GITHUB_REPOSITORY/commits/$BASE_REF" --jq '.sha')"
            BRANCH="agent/michael-aaron-redmond/pr-${PR_NUMBER}-${HEAD_SHA:0:12}"

            if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
              printf '{"pr":%s,"merge_state":"DIRTY","action":"human_review","reason":"fork_head"}\n' "$PR_NUMBER" > "reports/pr-${PR_NUMBER}.json"
              comment_once "$PR_NUMBER" "<!-- nonmerge-reconciliation:fork-head:$HEAD_SHA -->" "Michael Aaron Redmond detected a non-mergeable fork-based pull request. The workflow will not write to or execute code from an external fork. Human reconciliation under Jacob Thomas Redmond is required."
              continue
            fi

            rm -rf worktree
            git clone --no-checkout "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" worktree
            cd worktree
            git config user.name "Michael Aaron Redmond"
            git config user.email "michael-aaron-redmond-agent@users.noreply.github.com"
            git fetch origin "$BASE_REF" "$HEAD_SHA"
            git switch --create "$BRANCH" "$HEAD_SHA"

            set +e
            git merge --no-ff --no-commit "$BASE_SHA" > "../reports/pr-${PR_NUMBER}-merge.stdout" 2> "../reports/pr-${PR_NUMBER}-merge.stderr"
            STATUS=$?
            set -e

            if [ "$STATUS" -ne 0 ]; then
              git diff --name-only --diff-filter=U > "../reports/pr-${PR_NUMBER}-conflicts.txt"
              git merge --abort || true
              cd ..
              CONFLICT_FINGERPRINT="$(python - "$BASE_SHA" "reports/pr-${PR_NUMBER}-conflicts.txt" <<'PY'
          import hashlib
          import sys
          from pathlib import Path

          base_sha, conflict_path = sys.argv[1:]
          conflicts = sorted({
              line.strip()
              for line in Path(conflict_path).read_text(encoding="utf-8").splitlines()
              if line.strip()
          })
          payload = (base_sha + "\n" + "\n".join(conflicts) + "\n").encode("utf-8")
          print(hashlib.sha256(payload).hexdigest())
          PY
          )"
              python - "$PR_NUMBER" "$BASE_REF" "$HEAD_REF" "$HEAD_SHA" "$BASE_SHA" "$CONFLICT_FINGERPRINT" <<'PY'
          import json, sys
          from pathlib import Path
          pr, base_ref, head_ref, head_sha, base_sha, conflict_fingerprint = sys.argv[1:]
          conflicts = Path(f"reports/pr-{pr}-conflicts.txt").read_text().splitlines()
          Path(f"reports/pr-{pr}.json").write_text(json.dumps({
              "agent_id": "michael_aaron_redmond",
              "review_authority_id": "jacob_thomas_redmond",
              "pr": int(pr),
              "base_ref": base_ref,
              "head_ref": head_ref,
              "base_sha": base_sha,
              "head_sha": head_sha,
              "merge_state": "DIRTY",
              "reconciliation_result": "conflicts_require_human_review",
              "conflict_files": conflicts,
              "conflict_fingerprint": conflict_fingerprint,
              "automatic_merge_authorized": False
          }, sort_keys=True, separators=(",", ":")) + "\n")
          PY
              comment_once "$PR_NUMBER" "<!-- nonmerge-reconciliation:conflicts:$BASE_SHA:$CONFLICT_FINGERPRINT -->" "Michael Aaron Redmond attempted a non-destructive reconciliation with \`$BASE_REF\`, but the same unresolved conflict set remains. No history was rewritten and no merge was performed. Human review under Jacob Thomas Redmond is required. Evidence is retained in the workflow run that created this notice."
              continue
            fi

            git commit -m "Michael Aaron Redmond: reconcile PR #${PR_NUMBER} with ${BASE_REF}"
            git push origin "$BRANCH"
            RECONCILIATION_SHA="$(git rev-parse HEAD)"
            cd ..

            EXISTING="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$BRANCH" --limit 1 --json number --jq '.[0].number // empty')"
            if [ -z "$EXISTING" ]; then
              gh pr create --repo "$GITHUB_REPOSITORY" \
                --draft \
                --head "$BRANCH" \
                --base "$HEAD_REF" \
                --title "Michael Aaron Redmond: reconcile PR #${PR_NUMBER}" \
                --body "Automated non-destructive reconciliation of \`$BASE_REF\` into the exact current head of PR #${PR_NUMBER}. This draft PR does not authorize merge, publication, or release. Normal CI and Jacob Thomas Redmond plus human review remain required."
            fi

            python - "$PR_NUMBER" "$BASE_REF" "$HEAD_REF" "$HEAD_SHA" "$BASE_SHA" "$RECONCILIATION_SHA" <<'PY'
          import json, sys
          from pathlib import Path
          pr, base_ref, head_ref, head_sha, base_sha, reconciliation_sha = sys.argv[1:]
          Path(f"reports/pr-{pr}.json").write_text(json.dumps({
              "agent_id": "michael_aaron_redmond",
              "review_authority_id": "jacob_thomas_redmond",
              "pr": int(pr),
              "base_ref": base_ref,
              "head_ref": head_ref,
              "base_sha": base_sha,
              "head_sha": head_sha,
              "merge_state": "DIRTY",
              "reconciliation_result": "draft_reconciliation_pr_opened",
              "reconciliation_sha": reconciliation_sha,
              "automatic_merge_authorized": False
          }, sort_keys=True, separators=(",", ":")) + "\n")
          PY
          done < /tmp/prs.txt

      - name: Upload reconciliation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: automatic-nonmerge-reconciliation-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 30
          path: reports/
