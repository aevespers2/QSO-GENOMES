name: Documentation

on:
  pull_request:
    paths:
      - 'README.md'
      - 'changelog.md'
      - 'taskchain.md'
      - 'release.md'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/documentation.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'changelog.md'
      - 'taskchain.md'
      - 'release.md'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-documentation:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify exact source
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        run: python -m mkdocs build --strict --site-dir site

      - name: Validate generated-site boundary
        run: |
          test -f site/index.html
          test -f site/project-overview/index.html
          test -f site/architecture/index.html
          if find site -type f \( -name '*.pem' -o -name '*.key' -o -name '*.p12' -o -name '*.sqlite' -o -name '*.db' -o -name '.env' \) | grep -q .; then
            echo 'Generated documentation contains a prohibited sensitive file type.' >&2
            exit 1
          fi

      - name: Record documentation evidence
        run: |
          mkdir -p reports/documentation
          printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" > reports/documentation/exact-head.txt
          python --version > reports/documentation/python-version.txt 2>&1
          python -m mkdocs --version > reports/documentation/mkdocs-version.txt 2>&1
          find site -type f -print0 | sort -z | xargs -0 sha256sum > reports/documentation/site.sha256
          sha256sum mkdocs.yml requirements-docs.txt > reports/documentation/source-config.sha256

      - name: Upload documentation evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qso-genomes-documentation-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            site/
            reports/documentation/
          if-no-files-found: error
          retention-days: 90
