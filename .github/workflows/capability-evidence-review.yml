name: Capability Evidence and Self-Edit Review

on:
  pull_request:
    paths:
      - "docs/capability-evidence-and-self-edit-review.md"
      - "docs/capability-evidence-and-self-edit-review-v1.json"
      - "scripts/check_capability_evidence_review.py"
      - "tests/test_check_capability_evidence_review.py"
      - "taskchain.md"
      - "punchlist.md"
      - "release.md"
      - "changelog.md"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/capability-evidence-review.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qso-genomes-capability-evidence-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  validate-capability-evidence-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.EXPECTED_HEAD }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Initialize evidence and assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          test -z "$(git status --porcelain)"
          evidence="$RUNNER_TEMP/capability-evidence-review"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$EXPECTED_HEAD"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'authority_effect=none\n'
          } | tee "$evidence/source-identity.txt"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Validate review packet and controlled routes
        id: packet
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/capability-evidence-review"
          python scripts/check_capability_evidence_review.py \
            --submitted-sha "$EXPECTED_HEAD" \
            > "$evidence/capability-evidence-review-report.json" \
            2> "$evidence/capability-evidence-review-errors.txt"
          status=$?
          cat "$evidence/capability-evidence-review-report.json" || true
          cat "$evidence/capability-evidence-review-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile review regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/capability-evidence-review"
          python -m unittest tests.test_check_capability_evidence_review -v \
            > "$evidence/capability-evidence-review-tests.txt" 2>&1
          status=$?
          cat "$evidence/capability-evidence-review-tests.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate complete documentation surface
        id: docs
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/capability-evidence-review"
          python scripts/validate_documentation.py \
            > "$evidence/documentation-validation.txt" 2>&1
          status=$?
          cat "$evidence/documentation-validation.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install pinned documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/capability-evidence-review"
          mkdocs build --strict --site-dir "$RUNNER_TEMP/capability-evidence-site" \
            > "$evidence/mkdocs-build.txt" 2>&1
          status=$?
          cat "$evidence/mkdocs-build.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic inputs and clean-tree assurance
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/capability-evidence-review"
          sha256sum \
            docs/capability-evidence-and-self-edit-review.md \
            docs/capability-evidence-and-self-edit-review-v1.json \
            scripts/check_capability_evidence_review.py \
            tests/test_check_capability_evidence_review.py \
            taskchain.md punchlist.md release.md changelog.md \
            mkdocs.yml requirements-docs.txt \
            .github/workflows/capability-evidence-review.yml \
            > "$evidence/input-sha256.txt"
          if [ -d "$RUNNER_TEMP/capability-evidence-site" ]; then
            find "$RUNNER_TEMP/capability-evidence-site" -type f -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              > "$evidence/site-sha256.txt"
          fi
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload retained review evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qso-genomes-capability-evidence-${{ env.EXPECTED_HEAD }}
          path: ${{ runner.temp }}/capability-evidence-review
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on unsuccessful validation
        shell: bash
        env:
          PACKET_STATUS: ${{ steps.packet.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
          DOCS_STATUS: ${{ steps.docs.outputs.status }}
          BUILD_STATUS: ${{ steps.build.outputs.status }}
        run: |
          set -euo pipefail
          test "$PACKET_STATUS" = "0"
          test "$TEST_STATUS" = "0"
          test "$DOCS_STATUS" = "0"
          test "$BUILD_STATUS" = "0"
