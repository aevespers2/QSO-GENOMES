name: QSO-GENOMES conformance

on:
  pull_request:
  push:
    branches:
      - main
      - "builder/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qso-genomes-conformance-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHONHASHSEED: "0"
  TZ: UTC

jobs:
  conformance:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out reviewed commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pinned validator dependency
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check --no-cache-dir -r requirements.txt

      - name: Record environment and exact source state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports
          ACTUAL_SHA="$(git rev-parse HEAD)"
          EXPECTED_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          printf '%s\n' "$ACTUAL_SHA" > reports/exact-head.txt
          printf '%s\n' "$EXPECTED_SHA" > reports/event-head.txt
          test "$ACTUAL_SHA" = "$EXPECTED_SHA"
          python --version > reports/python-version.txt 2>&1
          python -m pip --version > reports/pip-version.txt 2>&1
          python -c "import importlib.metadata; print(importlib.metadata.version('jsonschema'))" > reports/jsonschema-version.txt

      - name: Validate genomes and sprites against Draft 2020-12 schemas
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_schema_set.py 2>&1 | tee reports/schema-validation.log

      - name: Run deterministic contract suite
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -v 2>&1 | tee reports/unittest.log

      - name: Replay compatibility manifest
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_contract_manifest.py --check 2>&1 | tee reports/manifest-replay.log

      - name: Hash retained evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports
          printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" > reports/event-head.txt
          git rev-parse HEAD > reports/exact-head.txt
          python --version > reports/python-version.txt 2>&1 || true
          python -m pip --version > reports/pip-version.txt 2>&1 || true
          find reports -maxdepth 1 -type f ! -name 'SHA256SUMS' -print0 \
            | sort -z \
            | xargs -0 -r sha256sum > reports/SHA256SUMS

      - name: Upload exact-head conformance evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qso-genomes-conformance-py${{ matrix.python-version }}-${{ github.event.pull_request.head.sha || github.sha }}
          path: reports/
          if-no-files-found: error
          retention-days: 90
