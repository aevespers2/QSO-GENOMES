name: Consent Capacity Lock

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-consent-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Validate consent capacity and fail-closed lock
        run: python scripts/validate_consent_lock.py
      - name: Upload lock evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consent-lock-${{ github.sha }}
          path: reports/consent-lock-validation.json
          if-no-files-found: error
          retention-days: 90
